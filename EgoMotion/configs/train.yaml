trainer:
  epochs: 30
  lr: 0.00003
  weight_decay: 0.001
  grad_clip_norm: 1.0
  device: cuda
  checkpoint_dir: checkpoints
  monitor_metric: val_loss
  monitor_mode: min
  best_ckpt_name: best_encoder.pt

loss:
  lambda_trunk: 1.0
  lambda_skeleton: 0.0
  lambda_occupancy: 0.0
  occupancy_pos_weight_clip_min: 1.0
  occupancy_pos_weight_clip_max: 200.0
